apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tpcp-relay-cert
  namespace: tpcp-system
  labels:
    app.kubernetes.io/name: tpcp-relay
    app.kubernetes.io/component: relay
spec:
  secretName: tpcp-relay-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - relay.tpcp.io
