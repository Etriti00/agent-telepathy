apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tpcp-relay-ingress
  namespace: tpcp-system
  labels:
    app.kubernetes.io/name: tpcp-relay
    app.kubernetes.io/component: relay
  annotations:
    kubernetes.io/ingress.class: nginx
    # WebSocket upgrade support — required for TPCP connections
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/websocket-services: tpcp-relay
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # TLS hardening — reject TLS 1.0 and 1.1
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.2 TLSv1.3"
    nginx.ingress.kubernetes.io/ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
spec:
  tls:
    - hosts:
        - relay.tpcp.io
      secretName: tpcp-relay-tls
  rules:
    - host: relay.tpcp.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tpcp-relay
                port:
                  number: 8765
