apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tpcp-relay-netpol
  namespace: tpcp-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: tpcp-relay
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8765
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    - ports:
        - protocol: UDP
          port: 53
