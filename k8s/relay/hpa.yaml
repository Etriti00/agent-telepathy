apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tpcp-relay-hpa
  namespace: tpcp-system
  labels:
    app.kubernetes.io/name: tpcp-relay
    app.kubernetes.io/component: relay
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tpcp-relay
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: AverageValue
          averageValue: 400Mi
