name: Go Tests
on:
  push:
    paths: ['tpcp-go/**']
  pull_request:
    paths: ['tpcp-go/**']
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: cd tpcp-go && go mod tidy && go vet ./...
      - run: cd tpcp-go && go test -race ./...
