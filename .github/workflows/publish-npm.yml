name: Publish TypeScript SDK to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-npm:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: |
        cd tpcp-ts
        npm install

    - name: Build
      run: |
        cd tpcp-ts
        npm run build

    - name: Run tests
      run: |
        cd tpcp-ts
        npm test -- --testPathIgnorePatterns="cross_language"

    - name: Publish to npm
      run: |
        cd tpcp-ts
        npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
