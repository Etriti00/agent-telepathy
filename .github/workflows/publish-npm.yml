name: Publish TypeScript SDK to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-npm:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'

    - name: Set up Python (required for cross-language fixture test)
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python tpcp package
      run: |
        cd tpcp
        pip install -e .

    - name: Install dependencies
      run: |
        cd tpcp-ts
        npm install

    - name: Build
      run: |
        cd tpcp-ts
        npm run build

    - name: Run full test suite (including cross-language)
      run: |
        cd tpcp-ts
        npm test

    - name: Publish to npm
      run: |
        cd tpcp-ts
        npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
