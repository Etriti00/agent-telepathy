name: TPCP CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        cd tpcp
        pip install -e ".[dev,edge]"
    - name: Lint and Type Check
      run: |
        cd tpcp
        ruff check .
        mypy tpcp
    - name: Run Tests
      run: |
        cd tpcp
        pytest

  typescript-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Set up Python for cross-language fixture
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install Python tpcp package
      run: |
        cd tpcp
        pip install -e .
    - name: Install dependencies
      run: |
        cd tpcp-ts
        npm install
    - name: Run Tests
      run: |
        cd tpcp-ts
        npm test
