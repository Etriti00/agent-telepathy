name: TPCP CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        cd tpcp
        pip install -e ".[dev,edge]"
    - name: Lint and Type Check
      run: |
        cd tpcp
        ruff check .
        mypy tpcp
    - name: Run Tests
      run: |
        cd tpcp
        pytest

  industrial-adapters:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install core + industrial extras
      run: |
        cd tpcp
        pip install -e ".[dev,industrial]"
    - name: Run OPC-UA adapter tests (asyncua built-in server)
      run: |
        cd tpcp
        pytest tests/test_opcua_adapter.py -v --timeout=30
    - name: Run Modbus adapter tests (pymodbus simulator)
      run: |
        cd tpcp
        pytest tests/test_modbus_adapter.py -v --timeout=30
    - name: Run CANbus adapter tests (virtual interface)
      run: |
        cd tpcp
        pytest tests/test_canbus_adapter.py -v --timeout=30

  go-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    - name: Download modules
      run: |
        cd tpcp-go
        go mod download
    - name: Build
      run: |
        cd tpcp-go
        go build ./...
    - name: Run tests
      run: |
        cd tpcp-go
        go test ./... -v -timeout 60s

  rust-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: thumbv7em-none-eabihf
    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: tpcp-rs
    - name: Build (std)
      run: |
        cd tpcp-rs
        cargo build --all
    - name: Run tests
      run: |
        cd tpcp-rs
        cargo test --all
    - name: Verify no_std compile (ARM Cortex-M)
      run: |
        cd tpcp-rs
        cargo build --target thumbv7em-none-eabihf -p tpcp-core --no-default-features

  java-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'
    - name: Build and test
      run: |
        cd tpcp-java
        ./gradlew build test

  typescript-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Set up Python for cross-language fixture
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install Python tpcp package
      run: |
        cd tpcp
        pip install -e .
    - name: Install dependencies
      run: |
        cd tpcp-ts
        npm install
    - name: Run Tests
      run: |
        cd tpcp-ts
        npm test
